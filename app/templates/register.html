<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Netflix Clone</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #141414;
            color: white;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background-color: rgba(0,0,0,0.7);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            padding: 15px 40px;
        }

        .navbar h1 {
            color: #e50914;
            font-size: 28px;
        }

        .form-container {
            background-color: rgba(0,0,0,0.8);
            width: 400px;
            margin: 80px auto;
            padding: 40px;
            border-radius: 8px;
        }

        .form-container h2 {
            font-size: 28px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background-color: #333;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            background-color: #e50914;
            color: white;
            padding: 15px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .form-container p {
            margin-top: 20px;
            color: #aaa;
        }

        .form-container a {
            color: white;
        }

        .flash {
            background-color: #e50914;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="overlay">

        <nav class="navbar">
            <h1>NETFLIX</h1>
        </nav>

        <div class="form-container">

            <h2>Sign Up</h2>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="flash">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">

                <div class="form-group">
                    <input type="text" name="username" placeholder="Username" required>
                </div>

                <div class="form-group">
                    <input type="email" name="email" placeholder="Email" required>
                </div>

                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="btn">
                    Sign Up
                </button>

            </form>

            <p>
                Already have an account?
                <a href="/login">Sign in</a>
            </p>

        </div>

    </div>

</body>
</html>
